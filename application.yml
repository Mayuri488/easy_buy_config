eureka:
  instance:
    preferIpAddress: true
  client:
    serviceUrl:
      defaultZone: ${EUREKA_ZONE:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  health:
    probe:
      enabled: true
    config:
      enabled: false


PRODUCT_SERVICE_ID: lb://PRODUCT-SERVICE
INVENTORY_SERVICE_ID: INVENTORY-SERVICE
CARD_ORDER_SERVICE_ID: CART-ORDER-SERVICE
